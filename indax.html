<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai image gemerate</title>
    <!------ link csss --------->
    <link rel="stylesheet" href="assets/css/styal.css">
    <link rel="shortcut icon" href="assets/image/robot logo.png" type="image/x-icon">
</head>

<body>

    <section class="image-generator" style="background-image: url(assets/image/bg.jpg);">
        <div class="content">
            <h1>AI Image Generator Tool JavaScript</h1>
            <p>Convert ypur text into an image within a second using this JavaScript-Powered AI Image Generator tool.
            </p>
            <form action="#" class="generate-form">
                <input type="text" class="prompt-input" placeholder="Describe what you want to see" required>
                <div class="controls">
                    <select class="img-quantity">
                        <option value="1">1 Image</option>
                        <option value="2">2 Image</option>
                        <option value="3">3 Image</option>
                        <option value="4" selected>4 Image</option>
                    </select>
                    <button type="submit"  class="generate-btn">Generate</button>
                </div>
            </form>
        </div>
    </section>

    <section class="image-gallery">
        <div class="img-card">
         <img src="assets/image/img-1.jpg" alt="image">
           <a href="#" class="download-btn">
            <img src="assets/image/download.svg" alt="download icon">
           </a>
        </div>
        <div class="img-card">
         <img src="assets/image/img-2.jpg" alt="image">
           <a href="#" class="download-btn">
            <img src="assets/image/download.svg" alt="download icon">
           </a>
        </div>
        <div class="img-card">
         <img src="assets/image/img-3.jpg" alt="image">
           <a href="#" class="download-btn">
            <img src="assets/image/download.svg" alt="download icon">
           </a>
        </div>
        <div class="img-card">
         <img src="assets/image/img-4.jpg" alt="image">
           <a href="#" class="download-btn">
            <img src="assets/image/download.svg" alt="download icon">
           </a>
        </div>
    </section>



</body>

</html>
